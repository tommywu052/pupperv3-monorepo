# Pupper v3: async online mapping — params aligned with mini_pupper real_table.yaml.
# Requires TF: odom -> base_link (EKF) and base_link -> lidar_link (URDF).
slam_toolbox:
  ros__parameters:
    use_sim_time: false
    map_frame: map
    odom_frame: odom
    base_frame: base_link
    scan_topic: /scan
    mode: mapping
    use_map_saver: true

    tf_buffer_duration: 30.0
    transform_publish_period: 0.1
    transform_timeout: 0.3

    map_update_interval: 0.5
    minimum_time_interval: 0.1
    resolution: 0.02

    scan_buffer_size: 25
    scan_buffer_maximum_scan_distance: 10.0
    throttle_scans: 1

    max_laser_range: 12.0
    min_laser_range: 0.02

    distance_variance_penalty: 1.0
    angle_variance_penalty: 1.5
    minimum_distance_penalty: 0.05
    minimum_angle_penalty: 0.15

    use_response_expansion: true
    do_loop_closing: true
    loop_match_minimum_chain_size: 3
    loop_match_maximum_variance_coarse: 3.0
    loop_match_minimum_response_coarse: 0.45
    loop_match_minimum_response_fine: 0.55

    link_match_minimum_response_fine: 0.12
    link_scan_maximum_distance: 1.5
    loop_search_maximum_distance: 3.0

    correlation_search_space_dimension: 0.5
    correlation_search_space_resolution: 0.01
    correlation_search_space_smear_deviation: 0.03

    loop_search_space_dimension: 5.0
    loop_search_space_resolution: 0.05
    loop_search_space_smear_deviation: 0.03

    minimum_travel_distance: 0.05
    minimum_travel_heading: 0.1

    use_scan_matching: true
    use_scan_barycenter: true
    check_min_dist_and_heading_precisely: false

    fine_search_angle_offset: 0.00349
    coarse_search_angle_offset: 0.349
    coarse_angle_resolution: 0.0349

    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: HuberLoss

    debug_logging: false
    restamp_tf: false
    stack_size_to_use: 40000000
    enable_interactive_mode: false
    min_pass_through: 2
    occupancy_threshold: 0.1

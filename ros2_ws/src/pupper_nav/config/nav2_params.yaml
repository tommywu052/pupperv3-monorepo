amcl:
  ros__parameters:
    use_sim_time: false
    alpha1: 0.35
    alpha2: 0.25
    alpha3: 0.35
    alpha4: 0.25
    alpha5: 0.2
    base_frame_id: "base_link"
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3
    do_beamskip: false
    global_frame_id: "map"
    lambda_short: 0.1
    laser_likelihood_max_dist: 2.0
    laser_max_range: 12.0
    laser_min_range: 0.08
    laser_model_type: "likelihood_field"
    max_beams: 60
    max_particles: 1500
    min_particles: 300
    odom_frame_id: "odom"
    pf_err: 0.05
    pf_z: 0.99
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0
    resample_interval: 1
    robot_model_type: "nav2_amcl::OmniMotionModel"
    save_pose_rate: 0.5
    scan_topic: "scan"
    set_initial_pose: true
    initial_pose:
      x: 7.20
      y: 4.40
      z: 0.0
      yaw: 2.60
    sigma_hit: 0.2
    tf_broadcast: true
    transform_tolerance: 1.0
    update_min_a: 0.15
    update_min_d: 0.05
    z_hit: 0.5
    z_max: 0.05
    z_rand: 0.5
    z_short: 0.05

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 1000
    navigators: ["navigate_to_pose", "navigate_through_poses"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 10.0
    min_x_velocity_threshold: 0.01
    min_y_velocity_threshold: 0.01
    min_theta_velocity_threshold: 0.01
    failure_tolerance: 0.4
    odom_topic: /odom
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.12
      movement_time_allowance: 8.0
    goal_checker:
      stateful: true
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.15
      yaw_goal_tolerance: 0.25
    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: false
      min_vel_x: -0.08
      min_vel_y: -0.08
      max_vel_x: 0.18
      max_vel_y: 0.14
      max_vel_theta: 0.5
      min_speed_xy: 0.0
      max_speed_xy: 0.18
      min_speed_theta: 0.0
      acc_lim_x: 0.35
      acc_lim_y: 0.30
      acc_lim_theta: 0.8
      decel_lim_x: -0.35
      decel_lim_y: -0.30
      decel_lim_theta: -0.8
      vx_samples: 12
      vy_samples: 10
      vtheta_samples: 16
      sim_time: 1.2
      linear_granularity: 0.05
      angular_granularity: 0.05
      transform_tolerance: 0.3
      xy_goal_tolerance: 0.15
      trans_stopped_velocity: 0.04
      short_circuit_trajectory_evaluation: true
      stateful: true
      critics:
        [
          "RotateToGoal",
          "Oscillation",
          "ObstacleFootprint",
          "GoalAlign",
          "PathAlign",
          "PathDist",
          "GoalDist",
        ]
      ObstacleFootprint.scale: 0.02
      PathAlign.scale: 16.0
      PathAlign.forward_point_distance: 0.12
      GoalAlign.scale: 12.0
      GoalAlign.forward_point_distance: 0.12
      PathDist.scale: 24.0
      GoalDist.scale: 20.0
      RotateToGoal.scale: 20.0
      RotateToGoal.slowing_factor: 4.0
      RotateToGoal.lookahead_time: -1.0

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 2
      height: 2
      resolution: 0.05
      footprint: "[[0.20, 0.13], [0.20, -0.13], [-0.20, -0.13], [-0.20, 0.13]]"
      transform_tolerance: 0.5
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          data_type: "LaserScan"
          marking: true
          clearing: true
          obstacle_max_range: 2.0
          obstacle_min_range: 0.08
          raytrace_max_range: 2.5
          raytrace_min_range: 0.08
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.22
        cost_scaling_factor: 4.0
      always_send_full_costmap: false

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      footprint: "[[0.20, 0.13], [0.20, -0.13], [-0.20, -0.13], [-0.20, 0.13]]"
      resolution: 0.05
      track_unknown_space: true
      transform_tolerance: 0.5
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          data_type: "LaserScan"
          marking: true
          clearing: true
          obstacle_max_range: 2.5
          obstacle_min_range: 0.08
          raytrace_max_range: 3.0
          raytrace_min_range: 0.08
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.28
        cost_scaling_factor: 4.0
      always_send_full_costmap: false

map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: "/home/pi/maps/pupper_map_ekf_v1.yaml"

planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 1.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_smac_planner::SmacPlanner2D"
      tolerance: 0.25
      downsample_costmap: false
      allow_unknown: true
      max_iterations: 100000
      max_on_approach_iterations: 1000
      cost_travel_multiplier: 2.0
      use_final_approach_orientation: false

smoother_server:
  ros__parameters:
    use_sim_time: false
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 500
      do_refinement: true

behavior_server:
  ros__parameters:
    use_sim_time: false
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 5.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"
    wait:
      plugin: "nav2_behaviors::Wait"
    local_frame: odom
    global_frame: map
    robot_base_frame: base_link
    transform_tolerance: 0.3
    simulate_ahead_time: 1.0
    max_rotational_vel: 0.4
    min_rotational_vel: 0.05
    rotational_acc_lim: 0.8
